name: "OpenA2A Trust Gate"
description: "Check AI package dependencies against the OpenA2A Registry trust API and verify AI agent identity status in PRs."

inputs:
  min-trust-level:
    description: "Minimum trust level required (0-4 scale: 0=Blocked, 1=Warning, 2=Listed, 3=Scanned, 4=Verified)"
    required: false
    default: "3"
  fail-on-warning:
    description: "Whether to fail the check when warning-level packages are found"
    required: false
    default: "true"
  registry-url:
    description: "OpenA2A Registry API URL"
    required: false
    default: "https://registry.opena2a.org"
  package-file:
    description: "Path to dependency file (auto-detected if not specified)"
    required: false
    default: ""
  check-aim:
    description: "Whether to check AIM agent identity status"
    required: false
    default: "true"
  post-comment:
    description: "Post results as a PR comment (requires GITHUB_TOKEN)"
    required: false
    default: "true"

outputs:
  result:
    description: "JSON summary of trust gate findings"
    value: ${{ steps.trust-check.outputs.result }}
  safe-count:
    description: "Number of packages at or above the minimum trust level"
    value: ${{ steps.trust-check.outputs.safe-count }}
  warning-count:
    description: "Number of packages below the minimum trust level but not blocked"
    value: ${{ steps.trust-check.outputs.warning-count }}
  blocked-count:
    description: "Number of blocked packages (trust level 0)"
    value: ${{ steps.trust-check.outputs.blocked-count }}
  aim-initialized:
    description: "Whether AIM is initialized in the repository"
    value: ${{ steps.aim-check.outputs.aim-initialized }}
  identity-count:
    description: "Number of registered agent identities"
    value: ${{ steps.aim-check.outputs.identity-count }}
  has-policy:
    description: "Whether capability policy exists"
    value: ${{ steps.aim-check.outputs.has-policy }}
  signature-count:
    description: "Number of config signatures"
    value: ${{ steps.aim-check.outputs.signature-count }}
  has-governance:
    description: "Whether SOUL.md governance file exists"
    value: ${{ steps.aim-check.outputs.has-governance }}

runs:
  using: "composite"
  steps:
    - name: Run OpenA2A Trust Gate
      id: trust-check
      shell: bash
      env:
        REGISTRY_URL: ${{ inputs.registry-url }}
        MIN_TRUST_LEVEL: ${{ inputs.min-trust-level }}
        FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        PACKAGE_FILE: ${{ inputs.package-file }}
        CHECK_AIM: "false"
      run: |
        bash "${{ github.action_path }}/scripts/trust-check.sh"

    - name: Check AIM Identity Status
      id: aim-check
      if: ${{ inputs.check-aim == 'true' }}
      shell: bash
      run: |
        bash "${{ github.action_path }}/scripts/aim-check.sh"

    - name: Post PR Comment
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        TRUST_RESULT: ${{ steps.trust-check.outputs.result }}
        AIM_INITIALIZED: ${{ steps.aim-check.outputs.aim-initialized }}
        AIM_SUMMARY: ${{ steps.aim-check.outputs.aim-summary }}
        IDENTITY_COUNT: ${{ steps.aim-check.outputs.identity-count }}
        HAS_GOVERNANCE: ${{ steps.aim-check.outputs.has-governance }}
        AI_ARTIFACT_COUNT: ${{ steps.aim-check.outputs.ai-artifact-count }}
        AI_COMMITTER: ${{ steps.aim-check.outputs.ai-committer }}
        SAFE_COUNT: ${{ steps.trust-check.outputs.safe-count }}
        WARNING_COUNT: ${{ steps.trust-check.outputs.warning-count }}
        BLOCKED_COUNT: ${{ steps.trust-check.outputs.blocked-count }}
      run: |
        bash "${{ github.action_path }}/scripts/post-comment.sh"

branding:
  icon: "shield"
  color: "blue"
